<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chatbot</title>
  <style>
    body { font-family: sans-serif; background: #ffffff; margin: 0; padding: 40px; text-align: center; }
    #chat-window { width: 350px; margin: 20px auto; background: rgb(93, 125, 189); border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
    #chat-header { background: #0b3ca7; padding: 14px; color: rgb(0, 0, 0); font-weight: bold; }
    #chat-messages { height: 300px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; }
    .bot { background: #f0f0f0; align-self: flex-start; }
    .user { background: #000000; color: white; align-self: flex-end; }
    #chat-input-row { display: flex; padding: 10px; gap: 8px; border-top: 1px solid #eee; }
    #chat-input-row input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
    #chat-input-row button { background: #ffb300; color: white; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Chatbot Test</h1>
  <div id="chat-window">
    <div id="chat-header">Business Assistant</div>
    <div id="chat-messages">
      <div class="msg bot">Hi! How can I help you?</div>
    </div>
    <div id="chat-input-row">
      <input type="text" id="user-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let history = [];

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage(text, 'user');
      history.push({ role: 'user', content: text });

      try {
        const res = await fetch('https://chatbot-production-7076.up.railway.app/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(0, -1) })
        });
        const data = await res.json();
        addMessage(data.reply, 'bot');
        history.push({ role: 'assistant', content: data.reply });
      } catch (err) {
        addMessage('Error: ' + err.message, 'bot');
      }
    }

    function addMessage(text, role) {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>
